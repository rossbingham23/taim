name: taim

services:
  # ── Data layer ──────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taim}
      POSTGRES_USER: ${POSTGRES_USER:-taim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taim} -d ${POSTGRES_DB:-taim}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis}
      --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend: API + SignalR ───────────────────────────────────────────────────
  taim-api:
    build:
      context: ./src/backend
      dockerfile: Taim.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: >
        Host=postgres;Database=${POSTGRES_DB:-taim};
        Username=${POSTGRES_USER:-taim};Password=${POSTGRES_PASSWORD:-changeme_postgres}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD:-changeme_redis}
      Jwt__Secret: ${JWT_SECRET:-changeme_jwt_secret_at_least_32_chars_long}
      Jwt__Issuer: ${JWT_ISSUER:-taim}
      Jwt__Audience: ${JWT_AUDIENCE:-taim-web}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      LlmProviders__Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    ports:
      - "${API_PORT:-5000}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Backend: Durable Task Worker ────────────────────────────────────────────
  taim-host:
    build:
      context: ./src/backend
      dockerfile: Taim.Host/Dockerfile
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Postgres: >
        Host=postgres;Database=${POSTGRES_DB:-taim};
        Username=${POSTGRES_USER:-taim};Password=${POSTGRES_PASSWORD:-changeme_postgres}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD:-changeme_redis}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      LlmProviders__Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  taim-web:
    build:
      context: ./src/frontend/taim-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:${API_PORT:-5000}
        VITE_SIGNALR_URL: http://localhost:${API_PORT:-5000}/hubs/agents
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - taim-api

  # ── MCP Servers ──────────────────────────────────────────────────────────────
  # These run as stdio-transport MCP servers; they are spawned as subprocesses
  # by the backend connectors (WebSearchConnector / EmailConnector) at runtime,
  # not connected to over the network. The Docker services here are kept only
  # for pre-building the images so the node_modules are cached; they exit
  # immediately because stdio transport needs an attached stdin.
  mcp-web-search:
    build:
      context: ./mcp-servers/web-search
    restart: "no"
    environment:
      PORT: 3100

  mcp-email:
    build:
      context: ./mcp-servers/email
    restart: "no"
    environment:
      PORT: 3101

volumes:
  postgres-data:
  redis-data:
